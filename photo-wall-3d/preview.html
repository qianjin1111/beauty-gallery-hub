<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦌 白鹿 · 星海银河 | 3D Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 100vw; height: 100vh;
      background: #0a0a12;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      color: #e8e4df;
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #1a1030 0%, #0a0a12 70%);
      z-index: 0;
    }
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,250,230,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 20%, rgba(255,250,230,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 50%, rgba(255,250,230,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,250,230,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,250,230,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 10%, rgba(255,250,230,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 50%, rgba(255,250,230,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 90%, rgba(255,250,230,0.5) 0%, transparent 100%);
      background-size: 100% 100%;
    }
    .container {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    .deer { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
    .title {
      font-size: clamp(32px, 8vw, 56px);
      color: #d4af37;
      letter-spacing: 0.3em;
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(212,175,55,0.4);
    }
    .subtitle {
      font-size: 13px;
      color: rgba(232,228,223,0.5);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .desc {
      font-size: 14px;
      color: rgba(232,228,223,0.6);
      line-height: 2;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }
    .open-btn {
      display: inline-block;
      padding: 14px 48px;
      border: 1px solid rgba(212,175,55,0.6);
      background: rgba(212,175,55,0.08);
      color: #d4af37;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-decoration: none;
      border-radius: 30px;
      font-family: 'Noto Serif SC', serif;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .open-btn:hover {
      background: rgba(212,175,55,0.15);
      border-color: #d4af37;
      box-shadow: 0 0 30px rgba(212,175,55,0.25);
      transform: translateY(-2px);
    }
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
    }
    .feat {
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      border-radius: 15px;
      font-size: 11px;
      color: rgba(232,228,223,0.5);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="stars"></div>
  </div>
  <div class="container">
    <div class="deer">🦌</div>
    <div class="title">白鹿</div>
    <div class="subtitle">Star Gallery · 2026</div>
    <div class="desc">
      三维星海环绕式照片墙<br/>
      163张精选图片 · 沉浸式银河体验
    </div>
    <a href="index.html" class="open-btn" target="_blank">✦ 进入星海 ✦</a>
    <div class="features">
      <span class="feat">🌌 3D 圆柱环绕</span>
      <span class="feat">✨ 星空粒子背景</span>
      <span class="feat">🎬 自动轮播</span>
      <span class="feat">🏷️ 分类筛选</span>
      <span class="feat">🔍 图片放大</span>
      <span class="feat">⌨️ 键盘控制</span>
    </div>
  </div>
</body>
</html>
