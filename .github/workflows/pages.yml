name: Deploy Beauty Gallery to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 创建构建目录
      - name: Create build directory
        run: |
          mkdir -p build
          # 复制主页面
          cp index.html build/
          # 复制 photo-wall 目录
          cp -r photo-wall build/
          # 复制 photo-wall-3d 目录
          cp -r photo-wall-3d build/

      # 部署整个构建目录
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
