name: Deploy Beauty Gallery to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Deploy photo-wall (main gallery)
      - name: Upload artifact - photo-wall
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./photo-wall

      # Deploy photo-wall-3d (3D gallery)
      - name: Upload artifact - photo-wall-3d
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./photo-wall-3d

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
