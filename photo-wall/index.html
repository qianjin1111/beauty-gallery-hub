<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白鹿照片墙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🦌 白鹿照片墙</h1>
            <p class="subtitle">自动轮播 · 图片管理 · 在线预览</p>
        </header>

        <!-- 控制面板 -->
        <div class="controls">
            <button id="prevBtn" class="btn btn-secondary">⬅️ 上一张</button>
            <button id="toggleBtn" class="btn btn-primary">⏸️ 暂停</button>
            <button id="nextBtn" class="btn btn-secondary">➡️ 下一张</button>
            <button id="shuffleBtn" class="btn btn-accent">🔀 随机</button>
            <button id="refreshBtn" class="btn btn-success">🔄 刷新图片</button>
        </div>

        <!-- 照片墙显示区 -->
        <div class="photo-wall">
            <div class="photo-display" id="photoDisplay">
                <img id="currentPhoto" src="" alt="白鹿照片" class="photo">
                <div class="photo-info" id="photoInfo">
                    <span class="photo-index" id="photoIndex">0 / 0</span>
                    <span class="photo-category" id="photoCategory">加载中...</span>
                </div>
            </div>
        </div>

        <!-- 缩略图预览 -->
        <div class="thumbnails" id="thumbnails">
            <!-- 缩略图将通过JavaScript动态生成 -->
        </div>

        <!-- 添加图片区域 -->
        <div class="add-photo-section">
            <h2>➕ 添加图片</h2>
            <div class="add-photo-form">
                <input type="text" id="imageUrl" placeholder="输入图片URL" class="input-field">
                <input type="text" id="imageCategory" placeholder="输入分类（如：红毯/活动）" class="input-field">
                <button id="addBtn" class="btn btn-primary">添加图片</button>
            </div>
        </div>

        <!-- 图片列表管理 -->
        <div class="image-list-section">
            <h2>📷 图片列表</h2>
            <div class="image-controls">
                <button id="deleteSelectedBtn" class="btn btn-danger">删除选中</button>
                <button id="selectAllBtn" class="btn btn-secondary">全选</button>
                <button id="clearAllBtn" class="btn btn-danger">清空所有</button>
            </div>
            <div class="image-list" id="imageList">
                <!-- 图片列表将通过JavaScript动态生成 -->
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="settings-panel">
            <h2>⚙️ 设置</h2>
            <div class="setting-item">
                <label for="interval">轮播间隔（秒）：</label>
                <input type="number" id="interval" value="3" min="1" max="60" class="input-field-small">
            </div>
            <div class="setting-item">
                <label for="autoFetch">自动拉取新图片：</label>
                <input type="checkbox" id="autoFetch" checked>
            </div>
            <div class="setting-item">
                <label for="fetchInterval">拉取间隔（分钟）：</label>
                <input type="number" id="fetchInterval" value="60" min="10" max="1440" class="input-field-small">
            </div>
            <button id="saveSettings" class="btn btn-success">保存设置</button>
        </div>

        <!-- 统计信息 -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">总图片数：</span>
                <span class="stat-value" id="totalImages">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">分类数：</span>
                <span class="stat-value" id="totalCategories">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最后更新：</span>
                <span class="stat-value" id="lastUpdate">-</span>
            </div>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>📸 白鹿照片墙 | <a href="https://github.com/qianjin1111/beauty-gallery-hub" target="_blank">GitHub项目</a></p>
            <p style="font-size: 12px; margin-top: 10px;">
                <a href="#" id="clearStorage" style="color: #666;">🗑️ 清除缓存并重新加载</a> | <a href="test-images.html" style="color: #666;">🧪 测试图片链接</a>
            </p>
        </footer>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="toast"></div>

    <!-- 大图预览模态框 -->
    <div id="imageModal" class="image-modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <button class="modal-nav modal-prev" id="modalPrev">⬅️</button>
            <button class="modal-nav modal-next" id="modalNext">➡️</button>
            <img id="modalImage" src="" alt="大图预览" class="modal-image">
            <div class="modal-info">
                <span id="modalIndex">0 / 0</span>
                <span id="modalCategory">分类</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
