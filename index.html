<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白鹿美图馆 | Bai Lu Beauty Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* 背景星星效果 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        .title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: clamp(3rem, 8vw, 5rem);
            margin-bottom: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #f0d060 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.3em;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .gallery-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s ease;
            cursor: pointer;
            animation: fadeInUp 0.8s ease-out;
        }

        .gallery-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3);
        }

        .gallery-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        .gallery-card:nth-child(2) .gallery-icon {
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gallery-title {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 2rem;
            margin-bottom: 10px;
            color: #d4af37;
        }

        .gallery-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .gallery-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tag {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .footer {
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            animation: fadeIn 1.2s ease-out;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #d4af37;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .gallery-card {
                padding: 30px 20px;
            }

            .gallery-icon {
                font-size: 3rem;
            }

            .gallery-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景星星 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1 class="title">白鹿美图馆</h1>
            <p class="subtitle">Bai Lu Beauty Gallery</p>
        </div>

        <div class="gallery-grid">
            <a href="photo-wall/" class="gallery-card">
                <span class="gallery-icon">📷</span>
                <h2 class="gallery-title">瀑布流</h2>
                <p class="gallery-desc">精选白鹿美图，自动轮播展示</p>
                <div class="gallery-tags">
                    <span class="tag">自动轮播</span>
                    <span class="tag">大图预览</span>
                    <span class="tag">分类管理</span>
                </div>
            </a>

            <a href="photo-wall-3d/" class="gallery-card">
                <span class="gallery-icon">✨</span>
                <h2 class="gallery-title">3D星海</h2>
                <p class="gallery-desc">沉浸式3D体验，星际漫游</p>
                <div class="gallery-tags">
                    <span class="tag">3D效果</span>
                    <span class="tag">星空背景</span>
                    <span class="tag">交互体验</span>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>🦌 白鹿美图馆 | <a href="https://github.com/qianjin1111/beauty-gallery-hub" target="_blank">GitHub项目</a></p>
        </div>
    </div>

    <script>
        // 创建背景星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 页面加载时创建星星
        window.addEventListener('load', createStars);
    </script>
</body>
</html>
